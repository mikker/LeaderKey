name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-14 # Using macOS Sonoma runner which has Xcode 15.2

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.2
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install swift-format
        run: brew install swift-format

      - name: Run swift-format
        run: |
          swift-format lint --recursive .
          swift-format format --in-place --recursive .

      - name: Clean Package.resolved
        run: |
          rm -f "Leader Key.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          rm -f *.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Build and Test
        run: |
          xcodebuild test \
            -project "Leader Key.xcodeproj" \
            -scheme "Leader Key" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
